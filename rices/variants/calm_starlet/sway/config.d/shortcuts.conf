# General Shortcuts - for some reason adding comments straight after the lines breaks things
# Kill focused window
bindsym --no-repeat $mod+Shift+c kill
# Reload SwayWM
bindsym --no-repeat $mod+Shift+q reload
# Fullscreen toggle
bindsym --no-repeat $mod+f fullscreen
# Setting split mode to horizontal
bindsym --no-repeat $mod+g splith
# Setting split mode to vertical
bindsym --no-repeat $mod+v splitv
# Floating toggle
bindsym --no-repeat $mod+Shift+space floating toggle
# Mod + lmb to move floating windows
floating_modifier $mod normal
bindsym $mod+b bar mode toggle bar-0

bindsym $mod+o opacity 0.85
bindsym $mod+shift+o opacity 1

# Application launchers
bindsym $mod+shift+p exec $menu -show drun # Rofi
bindsym $mod+p exec /home/alvin/.scripts/chooseapp # Rofi for common apps
bindsym $mod+Shift+Return exec $term # Terminal
bindsym $mod+shift+b exec librewolf # Browser
bindsym $mod+e exec thunar # File manager

# Screenshot
# bindsym $mod+Shift+s exec slurp | grim -g - - | satty --filename -
# bindsym $mod+print exec slurp | grim -g - - | satty --filename -
# bindsym $mod+ctrl+print exec grim - | satty --filename -
bindsym $mod+Shift+s exec grim -g "$(slurp)" - | wl-copy
bindsym $mod+ctrl+s exec grim -g "$(slurp)" ~/Pictures/screenshots/$(date +%Y%m%d-%H%M%S).png

# Other
bindsym --no-repeat Alt+F4 exec $forceKill
bindsym --no-repeat ctrl+shift+escape exec $term htop
bindsym --no-repeat $mod+shift+x exec $power_menu "rofi -dmenu"
bindsym --no-repeat $mod+shift+v exec cliphist list | rofi -dmenu | cliphist decode | wl-copy
bindsym --no-repeat $mod+t exec 'swaymsg "output * power on"'
bindsym --no-repeat $mod+shift+t exec 'swaymsg "output * power off"'


# Volume modification
bindsym $mod+f6 exec "pw-volume change -2.5%; pkill -RTMIN+8 waybar"
bindsym $mod+f7 exec "pw-volume mute toggle; pkill -RTMIN+8 waybar"
bindsym $mod+f8 exec "pw-volume change +2.5%; pkill -RTMIN+8 waybar"

#
# Scratchpad:
#
    # Sway has a "scratchpad", which is a bag of holding for windows.
    # You can send windows there and get them back later.

    # Move the currently focused window to the scratchpad
    bindsym $mod+Shift+minus move scratchpad

    # Show the next scratchpad window or hide the focused scratchpad window.
    # If there are multiple scratchpad windows, this command cycles through them.
    bindsym $mod+minus scratchpad show
#
# Resizing containers:
#
mode "resize" {
    # left will shrink the containers width
    # right will grow the containers width
    # up will shrink the containers height
    # down will grow the containers height
    bindsym $left resize shrink width 10px
    bindsym $down resize grow height 10px
    bindsym $up resize shrink height 10px
    bindsym $right resize grow width 10px

    # Ditto, with arrow keys
    bindsym Left resize shrink width 10px
    bindsym Down resize grow height 10px
    bindsym Up resize shrink height 10px
    bindsym Right resize grow width 10px

    # Return to default mode
    bindsym Return mode "default"
    bindsym Escape mode "default"
}
bindsym $mod+r mode "resize"
#
# Utilities:
#
    # Special keys to adjust volume via PulseAudio
    bindsym --locked XF86AudioMute exec pactl set-sink-mute \@DEFAULT_SINK@ toggle
    bindsym --locked XF86AudioLowerVolume exec pactl set-sink-volume \@DEFAULT_SINK@ -5%
    bindsym --locked XF86AudioRaiseVolume exec pactl set-sink-volume \@DEFAULT_SINK@ +5%
    bindsym --locked XF86AudioMicMute exec pactl set-source-mute \@DEFAULT_SOURCE@ toggle
    # Special keys to adjust brightness via brightnessctl
    bindsym --locked XF86MonBrightnessDown exec brightnessctl set 5%-
    bindsym --locked XF86MonBrightnessUp exec brightnessctl set 5%+

