backend = "glx"

# corner-radius = 5;

active-opacity = 1.0;
inactive-opacity = 1.0;

# opacity-rule = [
#  "90:class_g = 'Alacritty'",
#  "90:class_g = 'com.mitchellh.ghostty'",
#  "90:class_g = 'discord'",
# ]

blur-background = true;
blur-method = "dual_kawase";
blur-strength = 3;

shadow = true;
shadow-radius = 7;
shadow-offset-x = -7;
shadow-offset-y = -7;

#fading = true;
#fade-in-step = 0.03;
#fade-out-step = 0.03;
#frame-opacity = 0.7;


blur-kern = "3x3box";
dithered-present = false;
vsync = true;
detect-rounded-corners = true;
detect-client-opacity = true;
detect-transient = true;
use-damage = true;
#rules: ({
  #match = "window_type = 'tooltip'";
  #fade = false;
  #shadow = true;
  #opacity = 0.75;
  #full-shadow = false;
